name: credit_trak
description: Application mobile de gestion des transferts et crédit.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.0.0
  uuid: ^4.0.0
  intl: ^0.19.0
  pdf: ^3.10.0
  path_provider: ^2.1.0
  blue_thermal_printer: ^1.2.3
  fl_chart: ^0.66.0
  google_fonts: ^6.0.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.3.2
  share_plus: ^10.1.4
  permission_handler: ^11.3.1
  printing: ^5.13.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: CreditTrak.png
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: CreditTrak.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - CreditTrak.png
